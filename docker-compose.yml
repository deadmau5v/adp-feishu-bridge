# ─────────────────────────────────────────────────────────────
# ADP-Feishu Bridge - Docker Compose 示例
# 用法:
#   1. 复制 .env.example 为 .env, 填好 FEISHU_APP_ID/SECRET 和 ADP_BOT_APP_KEY
#   2. docker compose up -d
#
# 飞书渠道不需要本地消息中转服务：bridge 通过出站长连接直接连飞书，
# 出站访问 open.feishu.cn 即可，无需任何入站端口。
# ─────────────────────────────────────────────────────────────

services:
  bridge:
    # 本地构建：docker build -t adp-feishu-bridge:local .
    # 远端镜像：ghcr.io/deadmau5v/adp-feishu-bridge:latest
    image: ghcr.io/deadmau5v/adp-feishu-bridge:latest
    container_name: adp-feishu-bridge
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - BRIDGE_PORT=8080
    ports:
      - "8080:8080"   # 可选：仅健康检查 / 调试接口用
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
